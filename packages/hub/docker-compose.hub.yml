version: '3.8'

services:
  hub:
    image: ghcr.io/crs48/xnet-hub:latest
    container_name: xnet-hub
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4444
      - HUB_DATA_DIR=/data
      - HUB_AUTH=true
      - HUB_LOG_LEVEL=info
    volumes:
      - ./data:/data
    networks:
      - xnet
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:4444/health']
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: xnet-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - xnet
    depends_on:
      - hub

networks:
  xnet:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
