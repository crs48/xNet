# Railway configuration for xNet Demo Hub
#
# This file must be at the repo root because the Dockerfile
# expects to build from monorepo context (copies multiple packages).
#
# Deploy: Railway auto-deploys on push to main
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "packages/hub/Dockerfile"

[deploy]
# Railway sets $PORT env var - must pass it to the CLI
# Use sh -c to get shell features (cd, $PORT expansion)
# --public-url is baked in rather than left to the HUB_PUBLIC_URL service
# variable: recreating the Railway service silently drops variables, and
# without a public URL share links mint as http://localhost:<port>/s/...
# (2026-07-10 outage recovery). HUB_PUBLIC_URL still overrides when set.
startCommand = "sh -c 'cd /app && node packages/hub/dist/cli.js --port $PORT --data /data --role demo --public-url wss://hub.xnet.fyi'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
