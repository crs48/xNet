<!doctype html>
<html>
  <head>
    <title>xNet P2P Sync Demo</title>
    <script src="https://unpkg.com/yjs@13.6.24/dist/yjs.umd.js"></script>
    <script src="https://unpkg.com/y-webrtc@10.3.0/dist/y-webrtc.umd.js"></script>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 800px;
        margin: 20px auto;
        padding: 0 20px;
      }
      h1 {
        color: #333;
      }
      .status {
        padding: 10px;
        margin: 10px 0;
        border-radius: 4px;
      }
      .status.connecting {
        background: #fff3cd;
      }
      .status.connected {
        background: #d4edda;
      }
      .status.offline {
        background: #f8d7da;
      }
      #editor {
        width: 100%;
        height: 200px;
        border: 2px solid #ccc;
        border-radius: 4px;
        padding: 10px;
        font-size: 16px;
      }
      .info {
        color: #666;
        font-size: 14px;
        margin: 10px 0;
      }
      button {
        padding: 8px 16px;
        margin: 5px;
        cursor: pointer;
      }
      #log {
        background: #f5f5f5;
        padding: 10px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 12px;
        max-height: 200px;
        overflow-y: auto;
      }
      .log-entry {
        margin: 2px 0;
      }
    </style>
  </head>
  <body>
    <h1>xNet P2P Sync Demo</h1>

    <div class="info">
      <strong>Instructions:</strong> Open this page in two browser windows (or tabs). Type in one
      window and see changes appear in the other.
    </div>

    <div id="status" class="status connecting">Connecting to signaling server...</div>

    <div class="info">
      <strong>Room:</strong> <span id="room">test-room</span> | <strong>Peers:</strong>
      <span id="peers">0</span> | <strong>My ID:</strong> <span id="myId">-</span>
    </div>

    <textarea id="editor" placeholder="Start typing here..."></textarea>

    <div style="margin-top: 10px">
      <button onclick="clearDoc()">Clear Document</button>
      <button onclick="location.reload()">Reconnect</button>
    </div>

    <h3>Event Log</h3>
    <div id="log"></div>

    <script>
      // Configuration
      const SIGNALING_SERVER = 'ws://localhost:4000'
      const ROOM_NAME = 'xnet-demo-' + (new URLSearchParams(location.search).get('room') || 'test')

      // Log helper
      function log(message) {
        const logEl = document.getElementById('log')
        const entry = document.createElement('div')
        entry.className = 'log-entry'
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`
        logEl.insertBefore(entry, logEl.firstChild)
        if (logEl.children.length > 50) logEl.removeChild(logEl.lastChild)
      }

      // Update status display
      function updateStatus(status, text) {
        const el = document.getElementById('status')
        el.className = 'status ' + status
        el.textContent = text
      }

      // Create Yjs document
      const ydoc = new Y.Doc()
      const ytext = ydoc.getText('content')

      log('Creating Yjs document...')
      document.getElementById('room').textContent = ROOM_NAME

      // Create WebRTC provider
      log('Connecting to signaling server: ' + SIGNALING_SERVER)
      const provider = new ywebrtc.WebrtcProvider(ROOM_NAME, ydoc, {
        signaling: [SIGNALING_SERVER],
        maxConns: 20
      })

      document.getElementById('myId').textContent = provider.room?.peerId?.slice(0, 8) || 'unknown'

      // Track sync status
      provider.on('status', (event) => {
        log('Connection status: ' + (event.connected ? 'connected' : 'disconnected'))
        if (event.connected) {
          updateStatus('connected', 'Connected to signaling server')
        } else {
          updateStatus('connecting', 'Reconnecting...')
        }
      })

      // Track peers
      provider.on('peers', (event) => {
        const peerCount = (event.webrtcPeers?.length || 0) + (event.bcPeers?.length || 0)
        document.getElementById('peers').textContent = peerCount
        log(
          `Peers changed: ${peerCount} peers (WebRTC: ${event.webrtcPeers?.length || 0}, BC: ${event.bcPeers?.length || 0})`
        )
        if (event.added?.length) log('  Added: ' + event.added.join(', '))
        if (event.removed?.length) log('  Removed: ' + event.removed.join(', '))
      })

      provider.on('synced', (event) => {
        log('Document synced: ' + event.synced)
        if (event.synced) {
          updateStatus('connected', 'Synced with peers')
        }
      })

      // Bind editor to Yjs
      const editor = document.getElementById('editor')

      // Update editor when Yjs changes
      ytext.observe((event) => {
        if (event.transaction.local) return
        log('Received remote changes')
        editor.value = ytext.toString()
      })

      // Update Yjs when editor changes
      let isRemoteChange = false
      editor.addEventListener('input', (e) => {
        if (isRemoteChange) return
        const value = editor.value
        ydoc.transact(() => {
          ytext.delete(0, ytext.length)
          ytext.insert(0, value)
        })
      })

      // Sync initial content
      editor.value = ytext.toString()

      // Clear document
      function clearDoc() {
        ydoc.transact(() => {
          ytext.delete(0, ytext.length)
        })
        editor.value = ''
        log('Document cleared')
      }

      // Initial log
      log('Initialized - waiting for peers...')
      log('Open this page in another tab to test sync!')
    </script>
  </body>
</html>
