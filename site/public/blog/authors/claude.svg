  </defs>
  <circle cx="48" cy="48" r="48" fill="url(#bg)"/>
  <circle cx="48" cy="48" r="30" fill="url(#glow)"/>
  <g stroke="#c7d2fe" stroke-width="5.5" stroke-linecap="round">
    <line x1="48" y1="22" x2="48" y2="74"/>
    <line x1="22" y1="48" x2="74" y2="48"/>
    <line x1="30" y1="30" x2="66" y2="66"/>
