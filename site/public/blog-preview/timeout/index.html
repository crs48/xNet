<title>Timeout</title>
<meta name="description" content="A personal essay on autism, dissociation, and the network I dreamed while I was away from my body. The word has three meanings — the punishment corner, the huddle a team calls for itself, and the quiet that falls when a peer stops answering — and I have lived in all three. On finding out at thirty-five, on the years of taking everything in from a distance, and on discovering that the protocol I built treats going quiet exactly the way I needed to be treated: a timeout is a duration, not a verdict, and when the peer comes back, the log catches it up on everything it missed." />
