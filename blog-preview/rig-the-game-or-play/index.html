<title>Rig the Game or Play</title>
<meta name="description" content="The board game that taught a century of children to build monopolies was patented in 1904 to show that monopolies are unjust — and the cautionary rule set is the one that sold thirty million copies. On runaway leaders and the dead zone, why every table removes the auction and adds the Free Parking jackpot, what Hayek meant by competition as a discovery procedure, and why the rules of a rigged game are usually exposed by someone who got sued rather than by anyone’s transparency report." />
