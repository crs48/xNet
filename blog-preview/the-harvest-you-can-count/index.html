<title>The Harvest You Can Count</title>
<meta name="description" content="A video claims every food forest on Earth was deliberately erased. It is wrong, and it is pointing at something real. Layered perennial food systems existed on every inhabited continent, and most of them lost — but not the way the romantic version tells it. Grain genuinely won on calories and on labour. What the forest was better at was variance, soil carbon, micronutrients and independence from inputs, and no ledger has ever had a column for any of them. On appropriability, why a tenant cannot plant a ten-year asset, and why a local-first tool is illegible to a procurement department for exactly the same reason." />
