name: 'Setup xNet'
description: 'Checkout, install pnpm, Node.js, and dependencies'

inputs:
  node-version:
    description: 'Node.js version'
    default: '23'
  turbo-cache:
    description: 'Enable Turbo cache persistence'
    default: 'true'
  electron-cache:
    description: 'Cache Electron and electron-builder binaries'
    default: 'false'

runs:
  using: 'composite'
  steps:
    - uses: pnpm/action-setup@v4

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'

    - if: inputs.turbo-cache == 'true'
      uses: actions/cache@v4
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ github.sha }}
        restore-keys: turbo-${{ runner.os }}-

    - if: inputs.electron-cache == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/electron
          ~/.cache/electron-builder
        key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('apps/electron/package.json') }}
        restore-keys: electron-${{ runner.os }}-${{ runner.arch }}-

    # Setup Python with setuptools for native module builds (node-gyp requires distutils)
    # Python 3.12+ removed distutils from stdlib, so we need setuptools which provides it
    - if: runner.os == 'Windows' || runner.os == 'macOS'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - if: runner.os == 'Windows' || runner.os == 'macOS'
      run: python -m pip install setuptools
      shell: bash

    - run: pnpm install --frozen-lockfile
      shell: bash

    - name: Rebuild better-sqlite3 for correct Node version
      run: |
        echo "Node version: $(node --version)"
        echo "Removing cached better-sqlite3 binary..."
        rm -rf node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3/build
        rm -rf node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3/prebuilds
        echo "Rebuilding better-sqlite3..."
        cd node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3 && npx --yes prebuild-install || npm run build-release
      shell: bash
