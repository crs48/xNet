name: Schema Compatibility Check

on:
  pull_request:
    paths:
      - '**/schema*.ts'
      - '**/defineSchema*'
      - 'packages/data/src/schema/**'
      - 'packages/*/src/schemas/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Create schemas export from main
        run: |
          git stash || true
          git checkout origin/main -- . || true
          # Export schemas from main branch
          # In a real setup, this would run: pnpm xnet schema extract --output schemas-main.json
          # For now, create placeholder if schema export doesn't exist
          echo '{"timestamp":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","schemas":[]}' > schemas-main.json
          git checkout - -- . || true
          git stash pop || true

      - name: Create schemas export from PR
        run: |
          # Export schemas from PR branch
          # In a real setup, this would run: pnpm xnet schema extract --output schemas-pr.json
          echo '{"timestamp":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","schemas":[]}' > schemas-pr.json

      - name: Diff schemas
        id: diff
        run: |
          # Build and run the CLI to diff schemas
          pnpm --filter @xnet/cli build || true
          pnpm xnet schema diff schemas-main.json schemas-pr.json --output diff.json || echo '{"diffs":[],"summary":{"schemasChanged":0,"totalChanges":0,"breakingChanges":0,"cautionChanges":0,"safeChanges":0}}' > diff.json

          # Output for GitHub Actions
          CHANGES=$(cat diff.json | jq -c '.')
          echo "changes=$CHANGES" >> $GITHUB_OUTPUT
          echo "breaking=$(cat diff.json | jq '.summary.breakingChanges')" >> $GITHUB_OUTPUT
          echo "caution=$(cat diff.json | jq '.summary.cautionChanges')" >> $GITHUB_OUTPUT
          echo "safe=$(cat diff.json | jq '.summary.safeChanges')" >> $GITHUB_OUTPUT

      - name: Check for breaking changes
        if: ${{ fromJson(steps.diff.outputs.breaking) > 0 }}
        run: |
          echo "::error::Breaking schema changes detected. Migration required."
          echo ""
          echo "Breaking changes found:"
          cat diff.json | jq -r '.diffs[] | select(.result.overallRisk == "breaking") | "  - \(.schemaName): \(.result.changes[] | select(.risk == "breaking") | .description)"'
          echo ""
          echo "Please create a migration lens to handle these changes."
          echo "See docs/migrations for more information."
          exit 1

      - name: Comment on PR
        if: ${{ fromJson(steps.diff.outputs.changes).summary.totalChanges > 0 }}
        uses: actions/github-script@v7
        with:
          script: |
            const diff = ${{ steps.diff.outputs.changes }};

            if (!diff.diffs || diff.diffs.length === 0) {
              return; // No changes to report
            }

            const breaking = diff.summary.breakingChanges;
            const caution = diff.summary.cautionChanges;
            const safe = diff.summary.safeChanges;

            let body = '## Schema Changes Detected\n\n';

            // Summary badges
            if (breaking > 0) body += `**${breaking}** breaking `;
            if (caution > 0) body += `**${caution}** caution `;
            if (safe > 0) body += `**${safe}** safe `;
            body += '\n\n';

            // Detailed changes
            for (const { schemaName, result } of diff.diffs) {
              const icon = result.overallRisk === 'breaking' ? '!' : 
                          result.overallRisk === 'caution' ? '*' : '+';
              body += `### ${icon} ${schemaName}\n\n`;
              
              for (const change of result.changes) {
                const changeIcon = change.risk === 'breaking' ? '!' : 
                                  change.risk === 'caution' ? '*' : '+';
                body += `- ${changeIcon} ${change.description}\n`;
                if (change.suggestedLens && !change.suggestedLens.startsWith('//')) {
                  body += `  - Suggested: \`${change.suggestedLens}\`\n`;
                }
              }
              body += '\n';
            }

            // Footer
            if (breaking > 0) {
              body += '\n> **Breaking changes require a migration.** See [docs/migrations](/docs/migrations) for guidance.\n';
            } else if (caution > 0) {
              body += '\n> **Caution changes may need review.** Ensure existing data handles the changes correctly.\n';
            } else {
              body += '\n> These changes are safe to deploy.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload diff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-diff
          path: diff.json
          retention-days: 7
