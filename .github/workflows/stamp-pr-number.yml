name: Stamp Changelog PR Number

# Exploration 0203: make the PR number a property of the *source*, not just a
# deploy-time side-channel. When a PR that adds/edits a changelog fragment is
# merged, write its PR number — taken straight from the merge event, so it's
# exact, no git/API archaeology — into any fragment that doesn't already carry
# one, and commit that back to `main`. The author still commits once; this is the
# automated "second commit".
#
# The merge's own deploy already resolved the number onto the LIVE site via
# resolve-prs.mjs (workspace-only), so this commit is tagged `[skip ci]`: it
# reconciles the repo with production without triggering a redundant deploy/CI.
# If this can't push (e.g. the token lacks bypass on the `main` ruleset), it
# degrades to a warning — resolve-prs.mjs remains the deploy-time safety net.

on:
  pull_request:
    types: [closed]
    paths:
      - 'site/src/data/changelog/**'

permissions:
  contents: write
  pull-requests: read

# One stamp per PR; don't cancel a push mid-flight.
concurrency:
  group: stamp-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  stamp:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # A dedicated bypass token (GitHub App / PAT added to the `main`
          # ruleset bypass list) when available; otherwise the default token,
          # which a protected branch may reject — handled gracefully below.
          token: ${{ secrets.CHANGELOG_BOT_TOKEN || github.token }}

      - name: Write the PR number into this PR's changelog fragment(s)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs')
            const path = require('node:path')
            const pr = context.payload.pull_request.number
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr
            })
            const fragments = files
              .filter(
                (f) =>
                  /^site\/src\/data\/changelog\/.+\.json$/.test(f.filename) && f.status !== 'removed'
              )
              .map((f) => f.filename)
            let changed = 0
            for (const file of fragments) {
              if (!fs.existsSync(file)) continue // renamed/removed after merge
              const entry = JSON.parse(fs.readFileSync(file, 'utf8'))
              if (entry.pr) continue // already baked (--pr auto) — leave it
              entry.pr = pr
              fs.writeFileSync(file, JSON.stringify(entry, null, 2) + '\n')
              changed++
              core.notice(`Stamped ${path.basename(file)} → PR #${pr}`)
            }
            if (changed === 0) core.info('No fragment needed a PR number.')

      - name: Commit the stamp back to main
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$(git status --porcelain site/src/data/changelog)" ]; then
            echo "Nothing to stamp — every fragment already carries its PR number."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site/src/data/changelog
          git commit -m "docs(changelog): link PR #${PR_NUMBER} to its fragment [skip ci]"
          # Land it, tolerating a fragment-unrelated concurrent push to main.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Stamped PR #${PR_NUMBER} into source."
              exit 0
            fi
            echo "push rejected — rebasing onto main (attempt ${attempt})…"
            git pull --rebase origin main || break
          done
          echo "::warning title=changelog::Could not push the PR-number stamp to main. \
          The deploy-time resolver (resolve-prs.mjs) still fills it on the live site; \
          add CHANGELOG_BOT_TOKEN (with bypass on the main ruleset) to persist it in source."
          exit 0
