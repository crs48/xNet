name: Remove PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

# Shares the per-PR preview group: closing the PR supersedes any in-flight preview
# deploy for that PR, and can no longer cancel the production deploy.
concurrency:
  group: pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  remove-preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove preview from gh-pages
        uses: ./.github/actions/publish-gh-pages
        with:
          remove: pr/${{ github.event.pull_request.number }}
          commit-message: 'deploy(preview): remove PR #${{ github.event.pull_request.number }} preview'

      - name: Comment preview removal
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '<!-- xnet-pr-preview -->',
              `Preview removed for PR #${context.payload.pull_request.number}.`
            ].join('\n')

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            })

            const existing = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.includes('<!-- xnet-pr-preview -->')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              })
              return
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            })
