name: Remove PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-branch
  cancel-in-progress: true

jobs:
  remove-preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove preview from gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/xnet-gh-pages
          git fetch origin gh-pages || true

          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch does not exist yet."
            exit 0
          fi

          git worktree add -B gh-pages /tmp/xnet-gh-pages origin/gh-pages

          target="/tmp/xnet-gh-pages/pr/${{ github.event.pull_request.number }}"

          if [ ! -d "$target" ]; then
            echo "Preview path already absent."
            exit 0
          fi

          rm -rf "$target"

          cd /tmp/xnet-gh-pages
          git add -A

          if git diff --cached --quiet; then
            echo "No preview cleanup changes to publish."
            exit 0
          fi

          git commit -m "deploy(preview): remove PR #${{ github.event.pull_request.number }} preview"
          git push origin HEAD:gh-pages

      - name: Comment preview removal
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '<!-- xnet-pr-preview -->',
              `Preview removed for PR #${context.payload.pull_request.number}.`
            ].join('\n')

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            })

            const existing = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.includes('<!-- xnet-pr-preview -->')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              })
              return
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            })
