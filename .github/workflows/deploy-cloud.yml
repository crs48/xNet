name: deploy-cloud

# Deploy the xNet Cloud control plane to Cloud Run (exploration 0201).
#
# INERT BY DEFAULT: the deploy job is guarded by `vars.CLOUD_DEPLOY_ENABLED`, so
# until an operator opts in (repo variable + Workload Identity Federation secrets)
# the job is skipped — a skipped job is green, so merging this workflow never reds
# out main. Turn it on once the GCP side exists:
#   • Repo variable  CLOUD_DEPLOY_ENABLED = true
#   • Repo secrets   WIF_PROVIDER (workloadIdentityPools/.../providers/...),
#                    DEPLOYER_SA (xnet-deployer@xnet-cloud-staging-0.iam.gserviceaccount.com)
#   • A protected GitHub Environment `cloud-staging` (reviewers) so real infra is
#     never touched by a fork PR.
# Secrets are read from GCP Secret Manager by Cloud Run at boot — never from CI.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [staging]
        default: staging
  push:
    branches: [main]
    # These must cover the control plane's full build closure — the image bundles
    # every @xnetjs/* package in xnet-cloud's dependency graph (Dockerfile builds
    # with `--filter xnet-cloud...`). The authoritative closure (workspace packages)
    # is: cloud, core, crypto, entitlements, sqlite, storage. A change to any of
    # them rebuilds the image, so each must trigger a redeploy or staging silently
    # drifts behind main. Re-derive with `pnpm --filter xnet-cloud... ls --only-projects`
    # if @xnetjs/cloud's dependencies change.
    paths:
      - 'apps/cloud/**'
      - 'packages/cloud/**'
      - 'packages/core/**'
      - 'packages/crypto/**'
      - 'packages/entitlements/**'
      - 'packages/sqlite/**'
      - 'packages/storage/**'
      - '.github/workflows/deploy-cloud.yml'

permissions:
  contents: read
  id-token: write # OIDC token for Workload Identity Federation (no long-lived key)

concurrency:
  group: deploy-cloud-${{ github.ref }}
  cancel-in-progress: false

jobs:
  staging:
    if: ${{ vars.CLOUD_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: cloud-staging
    env:
      PROJECT: xnet-cloud-staging-0
      REGION: us-central1
      SERVICE: xnet-cloud-staging
      REPO: hub # the Artifact Registry repo the bootstrap created
      BASE_URL: https://cloud-staging.xnet.fyi
      HUB_IMAGE_TAG: '1.0.0' # plain image tag each provisioned hub is pinned to (repo:TAG; '@' is not a valid Docker tag)
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build + push control-plane image
        run: |
          IMAGE="us-docker.pkg.dev/${PROJECT}/${REPO}/control-plane:${GITHUB_SHA::8}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          gcloud auth configure-docker us-docker.pkg.dev --quiet
          docker buildx build --platform linux/amd64 \
            -f apps/cloud/Dockerfile -t "$IMAGE" --push .

      - name: Deploy to Cloud Run
        run: |
          # Non-secret config inline; secrets resolved from Secret Manager by the
          # service at boot. The runtime identity is the deployer SA (it already has
          # secretAccessor + datastore.user + run.admin), set explicitly so secret
          # resolution doesn't fall to the default compute SA. The secret *names*
          # below must exist in the project — push them with scripts/cloud-secrets-push.mjs.
          #
          # Managed AI (OpenRouter, exploration 0244) is wired only when its
          # Provisioning-key secret exists, so a not-yet-pushed key never fails the
          # deploy — push `openrouter-management-key` and the next deploy lights it up.
          # Existence probe via `versions access` (not `describe`): the deployer SA
          # has roles/secretmanager.secretAccessor (versions.access) but NOT
          # secrets.get, so `describe` would falsely fail and skip managed AI.
          AI_SECRET=""
          if gcloud secrets versions access latest --secret=openrouter-management-key --project "$PROJECT" >/dev/null 2>&1; then
            AI_SECRET=",OPENROUTER_MANAGEMENT_KEY=openrouter-management-key:latest"
          else
            echo "::notice::openrouter-management-key not accessible — deploying without managed AI (managed:false)"
          fi
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT" --region "$REGION" \
            --image "$IMAGE" --allow-unauthenticated --min-instances=1 \
            --service-account "${{ secrets.DEPLOYER_SA }}" \
            --set-env-vars "NODE_ENV=production,XNET_CLOUD_BASE_URL=${BASE_URL},XNET_CLOUD_MARKETING_URL=https://xnet.fyi/cloud,GCP_PROJECT_PREFIX=xnet-cloud-staging,GCP_REGION=${REGION},GCP_FIRESTORE_DATABASE=(default),R2_BUCKET=xnet-hub-data-staging,HUB_IMAGE_TAG=${HUB_IMAGE_TAG},AI_GATEWAY_PROVIDER=openrouter,AI_GATEWAY_BASE_URL=https://openrouter.ai/api/v1,AI_MARKUP=1.25,SENTRY_DSN=${{ vars.CLOUD_SENTRY_DSN }}" \
            --set-secrets "XNET_PLAN_SECRET=xnet-plan-secret:latest,XNET_CLOUD_SESSION_SECRET=session-secret:latest,XNET_CLOUD_INTERNAL_SECRET=internal-secret:latest,WORKOS_CLIENT_ID=workos-client-id:latest,WORKOS_API_KEY=workos-api-key:latest,WORKOS_REDIRECT_URI=workos-redirect-uri:latest,STRIPE_SECRET_KEY=stripe-secret:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook:latest,STRIPE_PRICE_PERSONAL=stripe-price-personal:latest,STRIPE_PRICE_FAMILY=stripe-price-family:latest,STRIPE_PRICE_TEAM=stripe-price-team:latest,R2_ACCOUNT_ID=r2-account-id:latest,R2_ENDPOINT=r2-endpoint:latest,R2_ACCESS_KEY_ID=r2-key-id:latest,R2_SECRET_ACCESS_KEY=r2-secret:latest,GCP_ARTIFACT_REGISTRY=gcp-artifact-registry:latest${AI_SECRET}"

      - name: Smoke test the deploy
        id: smoke
        run: node scripts/cloud-smoke.mjs "$BASE_URL"

      # If the smoke test failed, the new revision is live and broken — roll 100% of
      # traffic back to the previous revision so a bad deploy can't sit serving. The
      # job still ends red (the smoke failure isn't swallowed), but the URL recovers.
      # Only fires when the smoke step itself failed (deploy succeeded, traffic shifted);
      # a no-op-safe guard skips it when there's no prior revision to fall back to.
      - name: Roll back on smoke failure
        if: ${{ failure() && steps.smoke.outcome == 'failure' }}
        run: |
          PREV="$(gcloud run revisions list --service "$SERVICE" \
            --project "$PROJECT" --region "$REGION" \
            --format='value(metadata.name)' --sort-by='~metadata.creationTimestamp' \
            | sed -n 2p)"
          if [ -z "$PREV" ]; then
            echo "::warning::no previous revision to roll back to — leaving current revision live"
            exit 0
          fi
          echo "Rolling $SERVICE back to $PREV"
          gcloud run services update-traffic "$SERVICE" \
            --project "$PROJECT" --region "$REGION" --to-revisions "$PREV=100"
