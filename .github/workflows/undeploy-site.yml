name: Undeploy Site from GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  undeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare offline placeholder
        run: |
          rm -rf /tmp/xnet-offline
          mkdir -p /tmp/xnet-offline
          cp site/public/CNAME /tmp/xnet-offline/CNAME
          touch /tmp/xnet-offline/.nojekyll
          cat <<'EOF' > /tmp/xnet-offline/index.html
          <html>
            <body>
              <p>Site offline.</p>
            </body>
          </html>
          EOF

      # No excludes: undeploy intentionally wipes pr/ and branch/ previews too.
      - name: Replace gh-pages contents with offline page
        uses: ./.github/actions/publish-gh-pages
        with:
          source: /tmp/xnet-offline
          target: .
          commit-message: 'deploy(site): publish offline placeholder'
