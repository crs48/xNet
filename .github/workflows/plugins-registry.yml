name: Plugins Registry

# The plugins marketplace index (exploration 0201). Two roles:
#   - validate: on PRs that touch a submission source, check community.json /
#     blocked.json shape (no network) so a malformed submission fails fast.
#   - rebuild: on merge to main (or daily) regenerate registry/registry.json +
#     site/public/revoked.json from the sources, enriching community entries
#     from the GitHub API, and commit the result. That commit touches
#     registry/** which re-triggers the Deploy Site workflow.

on:
  pull_request:
    paths:
      - 'registry/community.json'
      - 'registry/blocked.json'
      - 'registry/first-party.json'
      - 'scripts/build-plugin-index.mjs'
  push:
    branches: [main]
    paths:
      - 'registry/community.json'
      - 'registry/blocked.json'
      - 'registry/first-party.json'
  schedule:
    - cron: '0 6 * * *' # daily — refresh stars / latest releases
  workflow_dispatch:

concurrency:
  group: plugins-registry-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Validate submission sources
        run: node scripts/build-plugin-index.mjs --validate

  rebuild:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Rebuild plugin index
        run: node scripts/build-plugin-index.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # main only takes changes through PRs (repo ruleset), so the old direct
      # `git push` was rejected on every cron that had changes (exploration
      # 0283). Refresh a standing PR instead — same shape as the changesets
      # release PR. Same caveat too: GITHUB_TOKEN events don't trigger CI on
      # the PR, so it needs an admin-merge (see 0265's release-PR gotcha).
      - name: Open/refresh registry data PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: plugins-registry/data
          add-paths: |
            registry/registry.json
            site/public/revoked.json
          commit-message: 'chore(registry): rebuild plugin index'
          signoff: true
          title: 'chore(registry): rebuild plugin index'
          labels: skip-changelog
          delete-branch: true
          body: |
            Automated refresh of `registry/registry.json` + `site/public/revoked.json`
            (stars / latest releases) from the daily Plugins Registry workflow.

            Like the changesets release PR, this PR gets no CI (GITHUB_TOKEN
            events don't trigger workflows) — review the diff and admin-merge.
