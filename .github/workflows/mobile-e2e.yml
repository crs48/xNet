# Mobile E2E (exploration 0238) — build the web bundle, wrap it with Capacitor,
# and run the Maestro flows on a simulator/emulator.
#
# Manual (`workflow_dispatch`) for now: it needs a hosted iOS/Android runner (or
# Maestro Cloud) that this repo hasn't provisioned yet, so it must not gate PRs.
# Promote to `pull_request` once it runs green on a real runner.
name: Mobile E2E

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to test
        type: choice
        default: android
        options:
          - android
          - ios

jobs:
  android:
    if: ${{ inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm turbo run build --filter='./packages/*'
      - name: Build hash-router web bundle
        run: pnpm --filter xnet-mobile-shell build:web
      - name: Add Android project
        run: pnpm --filter xnet-mobile-shell add:android
      - name: Sync Capacitor
        run: pnpm --filter xnet-mobile-shell sync
      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash
      # Build the APK and boot an emulator (reactivecircus/android-emulator-runner),
      # then run the flows. Left as the wiring step for a provisioned runner.
      - name: Run Maestro flows
        run: 'echo "TODO: build APK + boot emulator, then run: maestro test tests/mobile/flows"'

  ios:
    if: ${{ inputs.platform == 'ios' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm turbo run build --filter='./packages/*'
      - name: Build hash-router web bundle
        run: pnpm --filter xnet-mobile-shell build:web
      - name: Add iOS project
        run: pnpm --filter xnet-mobile-shell add:ios
      - name: Sync Capacitor
        run: pnpm --filter xnet-mobile-shell sync
      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash
      - name: Run Maestro flows
        run: 'echo "TODO: build .app for a booted simulator, then run: maestro test tests/mobile/flows"'
