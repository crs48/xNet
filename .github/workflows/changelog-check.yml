name: Changelog Check

# Exploration 0197: require every PR to either describe its user-facing change in
# a `## Changelog` section or carry the `skip-changelog` label. Runs on body and
# label edits so the check clears as soon as the PR is fixed. Add the job name
# `changelog-section` to the branch ruleset to make it block merges.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: changelog-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changelog-section:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Require a Changelog section (or skip-changelog label)
        id: check
        continue-on-error: true
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: node scripts/changelog/check.mjs

      - name: Post / resolve the helper comment
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.check.outcome }}' === 'success'
            const marker = '<!-- changelog-check -->'
            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number })
            const existing = comments.find(
              (c) => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
            )
            if (passed) {
              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id,
                  body: `${marker}\n✓ Changelog section found — thanks!`
                })
              }
              return
            }
            const body = [
              marker,
              '**This PR needs a `## Changelog` section.**',
              '',
              'Add one to the PR description so the change reaches the public',
              'changelog (CI publishes it automatically on merge):',
              '',
              '```markdown',
              '## Changelog',
              '',
              'Short, benefit-first headline',
              'One sentence on what the user can now do.',
              '- A specific user-visible point',
              'tags: app, ai',
              '```',
              '',
              'No user-facing change? Add the **`skip-changelog`** label instead.'
            ].join('\n')
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }

      - name: Enforce the result
        if: steps.check.outcome != 'success'
        run: |
          echo "Changelog section missing — see the PR comment above."
          exit 1
