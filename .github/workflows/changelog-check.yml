name: Changelog Check

# Exploration 0197: require every PR to either add a changelog fragment
# (site/src/data/changelog/*.json) or carry the `skip-changelog` label. The
# fragment rides in with the PR — nothing is written to main out of band. Keep
# the job name `changelog-section`; it's the required check in the main ruleset.
on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: changelog-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changelog-section:
    runs-on: ubuntu-latest
    steps:
      - name: Require a changelog fragment (or skip-changelog label)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            const pr = context.payload.pull_request
            const labels = pr.labels.map((l) => l.name)

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: pr.number
            })
            const hasFragment = files.some(
              (f) =>
                /^site\/src\/data\/changelog\/.+\.json$/.test(f.filename) &&
                f.status !== 'removed'
            )
            const passed = labels.includes('skip-changelog') || hasFragment

            const marker = '<!-- changelog-check -->'
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pr.number
            })
            const existing = comments.find(
              (c) => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
            )

            if (passed) {
              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id,
                  body: `${marker}\n✓ Changelog fragment found — thanks!`
                })
              }
              return
            }

            const body = [
              marker,
              '**This PR needs a changelog entry.**',
              '',
              'Add a fragment file to the PR (it lands with the merge — nothing is',
              'written to `main` separately, and the PR number is filled in at deploy):',
              '',
              '```bash',
              'node scripts/changelog/new.mjs --title "Short, benefit-first headline" \\',
              '  --summary "One sentence on what the user can now do." \\',
              '  --tags app,ai --highlight "A specific user-visible point"',
              '```',
              '',
              'No user-facing change? Add the **`skip-changelog`** label instead.'
            ].join('\n')

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body })
            }
            core.setFailed('No changelog fragment and no skip-changelog label.')
