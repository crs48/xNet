name: Changelog

# Exploration 0197: when a PR merges, write one changelog fragment from its
# `## Changelog` body block (or an AI draft) and commit it to main. The commit
# lands under site/**, so deploy-site republishes the page + JSON/RSS feeds.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Serialize so two near-simultaneous merges don't race on the push to main.
concurrency:
  group: changelog
  cancel-in-progress: false

jobs:
  entry:
    # Only on actual merges, only from this repo (forks have no write token),
    # and skippable via the `skip-changelog` label.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # A PAT (not GITHUB_TOKEN) so the resulting commit triggers deploy-site.
          token: ${{ secrets.RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build changelog fragment from the merged PR
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
        run: node scripts/changelog/from-pr.mjs

      - name: Commit the fragment to main
        if: steps.gen.outputs.written == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site/src/data/changelog/
          git commit -m "docs(changelog): entry for PR #${{ github.event.pull_request.number }}"
          # Land on top of any commits that arrived since checkout, then push.
          git pull --rebase origin main
          git push origin main

      - name: Prompt for a changelog when none was produced
        if: steps.gen.outputs.written != 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['needs-changelog']
            })
