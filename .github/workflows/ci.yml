name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - '.github/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - '.github/*.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Format check
        run: pnpm prettier --check "packages/**/*.{ts,tsx}" "apps/**/*.{ts,tsx}"

      - name: Build & Type check
        run: pnpm turbo run build typecheck

      - name: Lint
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Run tests (shard ${{ matrix.shard }})
        if: github.event_name == 'push'
        run: pnpm vitest run --shard=${{ matrix.shard }} --coverage

      - name: Run changed tests (shard ${{ matrix.shard }})
        if: github.event_name == 'pull_request'
        run: pnpm vitest run --changed=origin/${{ github.base_ref }} --shard=${{ matrix.shard }} --passWithNoTests

      - name: Upload coverage
        if: matrix.shard == '1/3' && github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  editor-ux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Run focused editor interaction tests
        run: pnpm --filter @xnetjs/editor vitest run src/nodeviews/hooks/useNodeFocus.test.ts src/components/FloatingToolbar.test.tsx src/components/SlashMenu.test.tsx src/components/editor-ux-state.test.ts src/extensions/live-preview/inline-marks.integration.test.ts

      - name: Install Playwright browsers
        run: pnpm --filter @xnetjs/e2e-tests exec playwright install --with-deps chromium webkit

      - name: Start web app
        run: pnpm --filter xnet-web dev --host 127.0.0.1 --port 5173 > /tmp/xnet-web.log 2>&1 &

      - name: Wait for web app
        run: for i in {1..60}; do curl -fsS http://127.0.0.1:5173 >/dev/null && exit 0; sleep 2; done; echo "web app did not start"; exit 1

      - name: Run editor UX smoke tests (desktop + mobile)
        run: pnpm --filter @xnetjs/e2e-tests exec playwright test src/editor-ux.spec.ts src/editor-ux-mobile.spec.ts --project=chromium --project=mobile-chromium --fail-on-flaky-tests
        env:
          CI: 'true'
          PLAYWRIGHT_TEST_BASE_URL: 'http://127.0.0.1:5173'
