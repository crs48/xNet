name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Format check
        run: pnpm prettier --check "packages/**/*.{ts,tsx}" "apps/**/*.{ts,tsx}"

      - name: Build & Type check
        run: pnpm turbo run build typecheck

      - name: Lint
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      - name: Run tests (shard ${{ matrix.shard }})
        if: github.event_name == 'push'
        run: pnpm vitest run --shard=${{ matrix.shard }} --coverage

      - name: Run changed tests (shard ${{ matrix.shard }})
        if: github.event_name == 'pull_request'
        run: pnpm vitest run --changed=origin/${{ github.base_ref }} --shard=${{ matrix.shard }} --passWithNoTests

      - name: Upload coverage
        if: matrix.shard == '1/3' && github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
