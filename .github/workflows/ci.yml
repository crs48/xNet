name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - '.github/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - '.github/*.md'

# Cancel superseded PR runs (group keyed on the PR number). Pushes to main key
# on the commit SHA so each merge gets a unique group — never cancelled, never
# queued behind the previous merge's run. (Exploration 0193.)
concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # Fast checks that need NO build: prettier, eslint (not type-aware), and the
  # cloud license-boundary grep. Kept under the name `lint` so the existing
  # required status check still resolves. These used to sit serially behind the
  # ~250s build+typecheck step; now a formatting/lint failure surfaces in under
  # a minute instead of after the build (exploration 0193).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Format check
        run: pnpm prettier --check "packages/**/*.{ts,tsx}" "apps/**/*.{ts,tsx}"

      - name: Lint
        run: pnpm lint

      - name: Cloud license boundary
        run: pnpm check:cloud-boundary

      - name: Plugin license policy (0196)
        run: pnpm check:plugin-licenses

      - name: Motion vocabulary (0199)
        run: pnpm check:motion-vocab

      - name: Humane patterns (0234)
        run: pnpm check:humane-patterns

      - name: Publish closure (0220)
        run: pnpm check:publish-closure

      - name: Electron parity (0238)
        run: pnpm check:electron-parity

  # Validate changelog fragments and dry-run PR-number resolution on PRs, so a
  # malformed entry (which would otherwise fail only the production deploy and
  # freeze the whole changelog) or one that would ship numberless fails the PR
  # instead (exploration 0203). Deliberately light: plain Node + on-the-fly tsx,
  # no workspace install — both scripts are dependency-free / type-only.
  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '23'

      - name: Validate changelog fragments
        run: npx --yes tsx site/scripts/validate-changelog.ts

      - name: Dry-run PR-number resolution
        run: node scripts/changelog/resolve-prs.mjs --check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CHANGELOG_BASE_REF: ${{ github.event.pull_request.base.sha }}

  # The heavy half of the old lint job: build the workspace and typecheck it.
  # typecheck genuinely needs `^build` (turbo builds dependencies first), so it
  # stays coupled to the build. Runs in parallel with `lint`, `test`, and
  # `editor-ux`; it is the pipeline's long pole.
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build & Type check
        run: pnpm turbo run build typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      # No build step: vitest.config.ts aliases every @xnetjs/* import to the
      # package's src/, and no test imports from dist/, so the workspace build
      # is dead weight for the test run (exploration 0193). better-sqlite3 — the
      # only native dependency tests touch — is rebuilt in the setup composite.

      - name: Run tests (shard ${{ matrix.shard }})
        if: github.event_name == 'push'
        run: pnpm vitest run --shard=${{ matrix.shard }} --coverage

      - name: Run changed tests (shard ${{ matrix.shard }})
        if: github.event_name == 'pull_request'
        run: pnpm vitest run --changed=origin/${{ github.base_ref }} --shard=${{ matrix.shard }} --passWithNoTests

      - name: Upload coverage
        if: matrix.shard == '1/3' && github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  editor-ux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      # Cache the Playwright browser binaries (~/.cache/ms-playwright), keyed on
      # the pinned @playwright/test version and the browser set this job needs.
      # The big cost is the browser download; OS deps are not in this path, so
      # on a cache hit we still run `install-deps` (apt only) to keep webkit's
      # libraries present. (Exploration 0193.)
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.58.1-chromium-webkit

      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @xnetjs/e2e-tests exec playwright install --with-deps chromium webkit

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @xnetjs/e2e-tests exec playwright install-deps chromium webkit

      - name: Run focused editor interaction tests
        run: pnpm --filter @xnetjs/editor exec vitest run src/nodeviews/hooks/useNodeFocus.test.ts src/components/FloatingToolbar.test.tsx src/components/SlashMenu.test.tsx src/components/editor-ux-state.test.ts src/extensions/live-preview/inline-marks.integration.test.ts

      - name: Start web app
        run: pnpm --filter xnet-web dev --host 127.0.0.1 --port 5173 > /tmp/xnet-web.log 2>&1 &

      - name: Wait for web app
        run: for i in {1..60}; do curl -fsS http://127.0.0.1:5173 >/dev/null && exit 0; sleep 2; done; echo "web app did not start"; exit 1

      - name: Run editor UX smoke tests (desktop + mobile)
        run: pnpm --filter @xnetjs/e2e-tests exec playwright test src/editor-ux.spec.ts src/editor-ux-mobile.spec.ts src/safety-ui.spec.ts --project=chromium --project=mobile-chromium --fail-on-flaky-tests
        env:
          CI: 'true'
          PLAYWRIGHT_TEST_BASE_URL: 'http://127.0.0.1:5173'

      # Preserve the screenshots these smoke specs already take (they were
      # written to tmp/playwright and discarded). The richer changed-UI gallery
      # lives in the visual-capture workflow; this just keeps debug evidence.
      - name: Upload editor UX screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editor-ux-screenshots
          # Playwright runs with cwd=tests/e2e, so screenshots land there; the
          # root glob is a fallback for any spec run from the repo root.
          path: |
            tests/e2e/tmp/playwright/**/*.png
            tmp/playwright/**/*.png
          if-no-files-found: ignore
          retention-days: 14

  # Electron desktop e2e (exploration 0238, L2 + L3): the cross-client
  # convergence matrix (web↔web · electron↔web · electron↔electron, over ws and
  # best-effort webrtc, incl. offline→reconnect) and the `_electron.launch()` app
  # smoke (launch, no-console-errors, SQLite persist across restart, xnet://
  # deep-link routing, core canvas flow). Headless under xvfb.
  #
  # Native-module ABI: the in-process hub runs under plain Node and keeps the
  # Node-ABI better-sqlite3 from the setup composite, while the Electron app is
  # launched from an `electron-builder --dir` bundle whose native modules are
  # rebuilt for Electron's ABI — so the two never clash over one rebuilt copy.
  # `electron-cache: 'true'` caches ~/.cache/electron(-builder), so the native
  # rebuild is paid once. `--fail-on-flaky-tests` quarantines flakes (it never
  # retries to green).
  electron-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          electron-cache: 'true'

      - name: Build packages + Electron renderer/main
        run: pnpm turbo run build --filter=xnet-desktop --filter=@xnetjs/hub

      - name: Package Electron app (--dir, Electron-ABI native modules)
        run: |
          cd apps/electron
          CSC_IDENTITY_AUTO_DISCOVERY=false pnpm exec electron-builder --linux dir --x64

      # The packaged app carries its OWN Electron-ABI native modules; restore the
      # shared workspace copy to the Node ABI in case electron-builder's
      # npm-rebuild touched the hoisted pnpm store — the in-process hub runs under
      # plain Node and must be able to load better-sqlite3. No-op if untouched.
      - name: Restore Node-ABI native modules for the hub
        run: pnpm --filter xnet-desktop run deps:node

      - name: Resolve Electron binary
        id: binary
        run: |
          BIN=$(find apps/electron/dist/linux-unpacked -maxdepth 1 -type f -executable \
            ! -name 'chrome*' ! -name '*.so*' ! -name '*.bin' | head -1)
          if [ -z "$BIN" ]; then echo "no Electron binary found"; ls -la apps/electron/dist/linux-unpacked; exit 1; fi
          echo "Resolved Electron binary: $BIN"
          echo "path=$(pwd)/$BIN" >> "$GITHUB_OUTPUT"

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.58.1-chromium

      - name: Install Playwright Chromium (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @xnetjs/e2e-tests exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @xnetjs/e2e-tests exec playwright install-deps chromium

      - name: Run convergence matrix + Electron app smoke (xvfb)
        run: |
          xvfb-run --auto-servernum pnpm --filter @xnetjs/e2e-tests exec \
            playwright test src/sync-matrix.spec.ts src/electron-smoke.spec.ts \
            --project=chromium --project=electron --fail-on-flaky-tests
        env:
          CI: 'true'
          XNET_ELECTRON_BINARY: ${{ steps.binary.outputs.path }}
          XNET_ELECTRON_NO_SANDBOX: '1'

      - name: Upload Electron e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-e2e-artifacts
          path: |
            tests/e2e/test-results/**
            tests/e2e/tmp/**
          if-no-files-found: ignore
          retention-days: 14
