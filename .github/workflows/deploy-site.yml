name: Deploy Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'apps/web/**'
      - 'packages/**'
      - '!packages/**/*.md'
      - '!apps/web/*.md'
  workflow_dispatch:

permissions:
  contents: write

# Own concurrency group: sharing one group with the PR preview workflows let a
# "Remove PR Preview" run (fired by the same merge) cancel the production deploy.
concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Build packages
        run: pnpm build

      - name: Build web app (with hash router for GitHub Pages)
        run: pnpm --filter xnet-web build
        env:
          VITE_BASE_PATH: '/app/'
          VITE_USE_HASH_ROUTER: 'true'

      - name: Cache Astro build
        uses: actions/cache@v4
        with:
          path: site/.astro
          key: astro-${{ hashFiles('site/pnpm-lock.yaml', 'site/src/**', 'site/astro.config.mjs') }}
          restore-keys: astro-

      - name: Install site dependencies
        run: pnpm install --ignore-workspace
        working-directory: site

      - name: Build site
        run: pnpm build
        working-directory: site

      - name: Prepare production site tree
        run: |
          rm -rf /tmp/xnet-pages-root
          mkdir -p /tmp/xnet-pages-root/app
          cp -R site/dist/. /tmp/xnet-pages-root/
          cp -R apps/web/dist/. /tmp/xnet-pages-root/app/
          cp /tmp/xnet-pages-root/app/index.html /tmp/xnet-pages-root/app/404.html
          cp site/public/CNAME /tmp/xnet-pages-root/CNAME
          touch /tmp/xnet-pages-root/.nojekyll

      - name: Publish production site to gh-pages
        uses: ./.github/actions/publish-gh-pages
        with:
          source: /tmp/xnet-pages-root
          target: .
          exclude: |
            pr
            branch
          commit-message: 'deploy(site): publish production site'
