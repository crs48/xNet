name: Deploy Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'apps/web/**'
      - 'packages/**'
      - '!packages/**/*.md'
      - '!apps/web/*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-branch
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Build packages
        run: pnpm build

      - name: Build web app (with hash router for GitHub Pages)
        run: pnpm --filter xnet-web build
        env:
          VITE_BASE_PATH: '/app/'
          VITE_USE_HASH_ROUTER: 'true'

      - name: Cache Astro build
        uses: actions/cache@v4
        with:
          path: site/.astro
          key: astro-${{ hashFiles('site/pnpm-lock.yaml', 'site/src/**', 'site/astro.config.mjs') }}
          restore-keys: astro-

      - name: Install site dependencies
        run: pnpm install --ignore-workspace
        working-directory: site

      - name: Build site
        run: pnpm build
        working-directory: site

      - name: Prepare production site tree
        run: |
          rm -rf /tmp/xnet-pages-root
          mkdir -p /tmp/xnet-pages-root/app
          cp -R site/dist/. /tmp/xnet-pages-root/
          cp -R apps/web/dist/. /tmp/xnet-pages-root/app/
          cp /tmp/xnet-pages-root/app/index.html /tmp/xnet-pages-root/app/404.html
          cp site/public/CNAME /tmp/xnet-pages-root/CNAME
          touch /tmp/xnet-pages-root/.nojekyll

      - name: Publish production site to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/xnet-gh-pages
          git fetch origin gh-pages || true

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git worktree add -B gh-pages /tmp/xnet-gh-pages origin/gh-pages
          else
            git worktree add -B gh-pages /tmp/xnet-gh-pages HEAD
            find /tmp/xnet-gh-pages -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi

          rsync -a --delete --exclude pr /tmp/xnet-pages-root/ /tmp/xnet-gh-pages/
          mkdir -p /tmp/xnet-gh-pages/pr

          cd /tmp/xnet-gh-pages
          git add -A

          if git diff --cached --quiet; then
            echo "No production site changes to publish."
            exit 0
          fi

          git commit -m "deploy(site): publish production site"
          git push origin HEAD:gh-pages
