name: Fallow

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - '.github/*.md'
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * 1'

permissions:
  contents: read
  security-events: write

concurrency:
  group: fallow-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  report:
    name: Report
    runs-on: ubuntu-latest
    # fallow's base-snapshot pass runs `git worktree add`, which triggers the
    # repo's husky post-checkout hook inside the fresh worktree, where it dies
    # with exit 127 and fails the worktree creation. HUSKY=0 both skips hook
    # installation during pnpm install and short-circuits any installed shim.
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          turbo-cache: 'false'

      - name: Fetch Fallow base
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          else
            git fetch --no-tags origin "main:refs/remotes/origin/main"
          fi

      - name: Select Fallow base
        id: base
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=origin/main" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packages
        run: pnpm turbo run build --filter='./packages/*'

      # CRAP scoring needs real coverage: without it every function counts
      # as 0% covered and CRAP = cc^2 + cc, so any new function with
      # cyclomatic >= 5 fails the audit. Istanbul provider because fallow's
      # parser rejects the -1 markers in v8-converted coverage maps.
      - name: Generate coverage for CRAP scoring
        shell: bash
        run: |
          pnpm vitest run \
            --coverage.enabled \
            --coverage.provider=istanbul \
            --coverage.reporter=json \
            --coverage.reportsDirectory=coverage

      - name: Run Fallow audit
        shell: bash
        run: |
          COVERAGE_ARGS=()
          if [[ -f coverage/coverage-final.json ]]; then
            COVERAGE_ARGS=(--coverage coverage/coverage-final.json)
          fi
          pnpm exec fallow audit \
            --changed-since "${{ steps.base.outputs.ref }}" \
            "${COVERAGE_ARGS[@]}" \
            --format sarif \
            --fail-on-issues > fallow-audit.sarif

      # CodeQL's upload action rejects SARIF files that contain multiple runs
      # under one category, and fallow emits one run per sub-analysis — this
      # is why every upload failed before. Merge the runs (same driver) into
      # one, and drop run-level notices without locations (code scanning
      # requires every result to carry at least one; they still appear in the
      # step summary). Producing the .single.sarif file only when the input
      # parses also guards against the empty file a crashed audit leaves
      # behind, which passes hashFiles() but is not valid JSON.
      - name: Normalize Fallow SARIF to a single run
        if: always()
        shell: bash
        run: |
          if jq -e '.runs | length >= 1' fallow-audit.sarif > /dev/null 2>&1; then
            jq '.runs[0].results = ([.runs[].results // []] | add | map(select((.locations // []) | length > 0))) |
                .runs[0].tool.driver.rules = ([.runs[].tool.driver.rules // []] | add | unique_by(.id)) |
                .runs = [.runs[0]]' fallow-audit.sarif > fallow-audit.single.sarif
          fi

      - name: Upload Fallow SARIF
        if: always() && hashFiles('fallow-audit.single.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: fallow-audit.single.sarif
          category: fallow-audit

      - name: Run Fallow dead-code regression
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          pnpm exec fallow dead-code \
            --fail-on-regression \
            --regression-baseline docs/reference/fallow-dead-code-regression-baseline.json \
            --summary \
            --no-cache

      - name: Append Fallow summaries
        if: always()
        shell: bash
        run: |
          {
            echo "## Fallow report"
            echo ""
            echo "### Dead code"
            echo '```text'
            pnpm exec fallow dead-code --summary --no-cache || true
            echo '```'
            echo ""
            echo "### Duplication"
            echo '```text'
            pnpm exec fallow dupes --summary --no-cache || true
            echo '```'
            echo ""
            echo "### Health"
            echo '```text'
            pnpm exec fallow health --score --hotspots --targets --top 10 --no-cache || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Weekly check that the marketing site and docs haven't silently fallen
  # behind feature work (exploration 0170). Warns — never fails — when the
  # last commit touching site/ is more than ~4 weeks older than the last
  # commit touching apps/ or packages/.
  site-staleness:
    name: Site staleness
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Warn when site/ lags feature work
        shell: bash
        run: |
          set -euo pipefail
          site_ts=$(git log -1 --format=%ct -- site/ || echo 0)
          code_ts=$(git log -1 --format=%ct -- apps/ packages/ || echo 0)
          lag_days=$(( (code_ts - site_ts) / 86400 ))
          {
            echo "## Site staleness"
            echo ""
            echo "- Last site/ change: $(git log -1 --format='%h %ad %s' --date=short -- site/ || echo none)"
            echo "- Last apps/packages change: $(git log -1 --format='%h %ad %s' --date=short -- apps/ packages/ || echo none)"
            echo "- Lag: ${lag_days} days"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$lag_days" -gt 28 ]; then
            echo "::warning title=Site is stale::site/ has not changed in ${lag_days} days of feature work — landing page and docs may be out of sync (see docs/explorations/0170)."
          else
            echo "Site lag is ${lag_days} days — within budget."
          fi
