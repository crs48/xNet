name: Electron Release

on:
  push:
    branches: [main]
    paths:
      - 'apps/electron/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '!*.md'
      - '!**/*.md'
      - '!docs/**'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - prerelease
          - release

concurrency:
  group: electron-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./apps/electron/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-js:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build packages
        run: pnpm build

      - name: Upload JS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: js-build
          path: |
            packages/*/dist
            apps/electron/out
          retention-days: 1

  build-macos:
    needs: [version, build-js]
    if: needs.version.outputs.should_release == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          electron-cache: 'true'

      - name: Download JS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: js-build
          path: .

      - name: Resolve macOS signing mode
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=0

          for var in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_ID_PASSWORD APPLE_TEAM_ID KEYCHAIN_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "mode=self-signed" >> "$GITHUB_OUTPUT"
            echo "Using development self-signed macOS certificates (not notarized)."
          else
            echo "mode=apple" >> "$GITHUB_OUTPUT"
            echo "Using Apple Developer ID certificate + notarization."
          fi

      - name: Import code signing certificates
        if: steps.signing.outputs.mode == 'apple'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Create self-signed certificate (development)
        if: steps.signing.outputs.mode == 'self-signed'
        id: selfsigned
        run: |
          CERT_PASSWORD="$(openssl rand -hex 16)"
          echo "::add-mask::$CERT_PASSWORD"

          cat <<'EOF' > "$RUNNER_TEMP/xnet-dev-openssl.cnf"
          [req]
          distinguished_name = req_distinguished_name
          x509_extensions = v3_codesign
          prompt = no

          [req_distinguished_name]
          CN = xNet Dev Self-Signed
          O = xNet Development

          [v3_codesign]
          basicConstraints = critical,CA:false
          keyUsage = critical,digitalSignature
          extendedKeyUsage = codeSigning
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid,issuer
          EOF

          openssl req -x509 -newkey rsa:2048 -sha256 -nodes -days 365 \
            -config "$RUNNER_TEMP/xnet-dev-openssl.cnf" \
            -keyout "$RUNNER_TEMP/xnet-dev.key" \
            -out "$RUNNER_TEMP/xnet-dev.crt"

          openssl pkcs12 -export \
            -inkey "$RUNNER_TEMP/xnet-dev.key" \
            -in "$RUNNER_TEMP/xnet-dev.crt" \
            -out "$RUNNER_TEMP/xnet-dev.p12" \
            -name "xNet Dev Self-Signed" \
            -passout "pass:$CERT_PASSWORD"

          echo "csc_link=$RUNNER_TEMP/xnet-dev.p12" >> "$GITHUB_OUTPUT"
          echo "csc_key_password=$CERT_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Build Electron app (signed)
        if: steps.signing.outputs.mode == 'apple'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          cd apps/electron
          pnpm electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Build Electron app (self-signed)
        if: steps.signing.outputs.mode == 'self-signed'
        env:
          CSC_LINK: ${{ steps.selfsigned.outputs.csc_link }}
          CSC_KEY_PASSWORD: ${{ steps.selfsigned.outputs.csc_key_password }}
          CSC_NAME: xNet Dev Self-Signed
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          cd apps/electron
          pnpm electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Verify app signature
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            APP_PATH="apps/electron/dist/mac-arm64/xNet.app"
          else
            APP_PATH="apps/electron/dist/mac/xNet.app"
          fi

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dvv "$APP_PATH"

      - name: Notarize app
        if: steps.signing.outputs.mode == 'apple'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd apps/electron/dist
          DMG_FILE=$(ls *.dmg | head -1)
          xcrun notarytool submit "$DMG_FILE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_FILE"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            apps/electron/dist/*.dmg
            apps/electron/dist/*.zip
            apps/electron/dist/latest-mac.yml

  build-windows:
    needs: [version, build-js]
    if: needs.version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          electron-cache: 'true'

      - name: Download JS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: js-build
          path: .

      - name: Build Electron app (signed)
        if: env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          cd apps/electron
          pnpm electron-builder --win --x64 --publish never

      - name: Build Electron app (unsigned)
        if: env.WINDOWS_CERTIFICATE == ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          cd apps/electron
          pnpm electron-builder --win --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            apps/electron/dist/*.exe
            apps/electron/dist/latest.yml

  build-linux:
    needs: [version, build-js]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          electron-cache: 'true'

      - name: Download JS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: js-build
          path: .

      - name: Build Electron app
        run: |
          cd apps/electron
          pnpm electron-builder --linux --${{ matrix.arch }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            apps/electron/dist/*.AppImage
            apps/electron/dist/*.deb
            apps/electron/dist/latest-linux.yml

  release:
    needs: [version, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        run: |
          # Get commits since last release
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"- %s" -- apps/electron packages)
          else
            COMMITS=$(git log --pretty=format:"- %s" -20 -- apps/electron packages)
          fi

          cat << EOF > release-notes.md
          ## What's New

          $COMMITS

          ## Downloads

          | Platform | Download |
          |----------|----------|
          | macOS (Apple Silicon) | xNet-${{ needs.version.outputs.version }}-arm64.dmg |
          | macOS (Intel) | xNet-${{ needs.version.outputs.version }}-x64.dmg |
          | Windows | xNet-${{ needs.version.outputs.version }}-Setup.exe |
          | Linux (AppImage) | xNet-${{ needs.version.outputs.version }}.AppImage |
          | Linux (Debian) | xNet-${{ needs.version.outputs.version }}.deb |
          EOF

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect all release files, deduplicate by filename (not path)
          # Use only the primary arch artifacts to avoid duplicates
          declare -A seen
          declare -a FILES

          while IFS= read -r -d '' file; do
            basename=$(basename "$file")
            if [[ -z "${seen[$basename]}" ]]; then
              seen[$basename]=1
              FILES+=("$file")
            fi
          done < <(find artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \) -print0 | grep -zv js-build || true)

          # Also add the yml metadata files (take first occurrence)
          for yml in latest-mac.yml latest-linux.yml latest.yml; do
            file=$(find artifacts -name "$yml" -type f | head -1)
            if [ -n "$file" ]; then
              FILES+=("$file")
            fi
          done

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No release files found!"
            exit 1
          fi

          echo "Uploading ${#FILES[@]} files:"
          printf '%s\n' "${FILES[@]}"

          gh release create "v${{ needs.version.outputs.version }}" \
            --title "xNet v${{ needs.version.outputs.version }}" \
            --notes-file release-notes.md \
            ${{ github.event.inputs.release_type == 'draft' && '--draft' || '' }} \
            ${{ github.event.inputs.release_type == 'prerelease' && '--prerelease' || '' }} \
            "${FILES[@]}"
